<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <title>Ciclo7 — Treino</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0d0d0f" />
  <meta name="description" content="App de treino de hipertrofia — ciclo de 7 dias com registro de carga e progresso." />

  <!-- iOS standalone support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Ciclo7" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />

  <style>
    html, body { margin: 0; padding: 0; background: #0d0d0f; height: 100%; overscroll-behavior: none; }
    #root { height: 100%; }
    .boot { height: 100vh; display: flex; align-items: center; justify-content: center; color: #5a5a62; font-family: system-ui, sans-serif; }
  </style>
</head>
<body>
  <div id="root"><div class="boot">Carregando…</div></div>

  <!-- React via CDN (no build step needed) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Firebase (compat build: expõe `firebase` global, funciona sem bundler) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script>
    // Configuração pública do projeto (protegida pelas Security Rules do Firestore)
    var firebaseConfig = {
      apiKey: "AIzaSyDlEJx9Npbn7JMqsmuY3UEA-8Me94Ac8o0",
      authDomain: "ciclo7.firebaseapp.com",
      projectId: "ciclo7",
      storageBucket: "ciclo7.firebasestorage.app",
      messagingSenderId: "1062618499002",
      appId: "1:1062618499002:web:0feca5e08893dd9878ff83"
    };
    firebase.initializeApp(firebaseConfig);
    // Cache offline nativo: o app funciona sem internet e sincroniza ao reconectar
    firebase.firestore().enablePersistence({ synchronizeTabs: true }).catch(function (e) {
      console.warn("Persistência offline indisponível:", e && e.code);
    });
    window.fbAuth = firebase.auth();
    window.fbDb = firebase.firestore();
  </script>

  <!-- Babel transpiles the JSX in app.js in the browser -->
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
  <script type="text/babel" src="app.js" data-presets="react"></script>

  <!-- Register service worker for offline + installability -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').catch(function (e) {
          console.warn('SW registration failed', e);
        });
      });
    }
  </script>
</body>
</html>
