// STORAGE — IndexedDB (offline, persiste no navegador)
// ============================================================
const DB_NAME="ciclo7", STORE="kv";
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB_NAME,1);r.onupgradeneeded=()=>r.result.createObjectStore(STORE);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
async function dbGet(key,fb){try{const db=await openDB();return await new Promise((res)=>{const tx=db.transaction(STORE,"readonly").objectStore(STORE).get(key);tx.onsuccess=()=>res(tx.result===undefined?fb:tx.result);tx.onerror=()=>res(fb);});}catch(e){return fb;}}
async function dbSet(key,val){try{const db=await openDB();return await new Promise((res)=>{const tx=db.transaction(STORE,"readwrite").objectStore(STORE).put(val,key);tx.onsuccess=()=>res(true);tx.onerror=()=>res(false);});}catch(e){return false;}}

async function load(){
